<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>git</title>
    <link rel="manifest" href="web/manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3678/3678166.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <i class="fas fa-bars menu-icon"></i>
            </div>
            <div class="header-center">
                <span class="app-title">Daily Wisdom</span>
            </div>
            <div class="header-right">
                <i class="fas fa-moon theme-icon"></i>
            </div>
        </header>

        <!-- Main Content -->
        <main class="quote-container">
            <div class="quote-content" id="quote-box">
                <div class="quote-mark">“</div>
                <p id="quote-text" class="quote-text">Loading inspiration...</p>
                <div class="quote-mark footer">”</div>
                <p id="quote-author" class="quote-author"></p>
            </div>
            
            <div class="actions">
                <button id="new-quote-btn" class="classic-btn">
                    <span>New Quote</span>
                </button>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-heart"></i>
                <span>Favorites</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
